# railway.toml
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run db:generate && npx prisma migrate deploy && npm run db:seed && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "privacyscan-api"
